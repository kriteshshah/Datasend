{% extends 'chat/base.html' %}
{% block title %}Login — Spark Chat{% endblock %}
{% block extra_css %}
<style>
.auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(34,211,160,0.08) 0%, transparent 50%);
}
.auth-card {
    width: 100%;
    max-width: 420px;
    padding: 48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
}
.auth-logo {
    text-align: center;
    margin-bottom: 32px;
}
.logo-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 16px;
    box-shadow: 0 0 40px var(--accent-glow);
}
.auth-card h1 { font-size: 26px; font-weight: 700; text-align: center; }
.auth-card p { color: var(--text-secondary); text-align: center; margin-top: 6px; }
.form-group { margin-bottom: 18px; margin-top: 28px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
.error-box {
    background: rgba(255,77,106,0.1);
    border: 1px solid rgba(255,77,106,0.3);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 16px;
}
.divider { text-align: center; color: var(--text-muted); font-size: 13px; margin: 20px 0; position: relative; }
.divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: var(--border);
}
.divider::before { left: 0; }
.divider::after { right: 0; }
.auth-link { text-align: center; color: var(--text-secondary); font-size: 13px; margin-top: 20px; }
.auth-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
.auth-link a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">⚡</div>
            <h1>Welcome back</h1>
            <p>Sign in to Spark Chat</p>
        </div>

        {% if error %}
        <div class="error-box">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autocomplete="username">
            </div>
            <div class="form-group" style="margin-top:16px;">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:24px;padding:13px;">
                Sign In ⚡
            </button>
        </form>

        <div class="divider">or</div>

        <div class="auth-link">
            Don't have an account? <a href="{% url 'register' %}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
