<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Spark Chat{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d0f14;
            --bg-secondary: #141720;
            --bg-tertiary: #1c2030;
            --bg-hover: #232840;
            --surface: #1e2235;
            --surface-2: #252b45;
            --border: #2a3050;
            --border-light: #3a4268;
            --accent: #6c63ff;
            --accent-2: #a78bfa;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --green: #22d3a0;
            --red: #ff4d6a;
            --yellow: #ffd166;
            --blue: #38bdf8;
            --text-primary: #e8ecf5;
            --text-secondary: #8892b0;
            --text-muted: #4a5280;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 18px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 48px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

        /* Common Components */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-primary:hover {
            background: #7b74ff;
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateY(-1px);
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-light);
        }
        .btn-danger {
            background: var(--red);
            color: #fff;
        }

        input, textarea {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            outline: none;
            transition: all 0.2s;
            width: 100%;
        }
        input:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        input::placeholder { color: var(--text-muted); }

        /* Avatar */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar.sm { width: 32px; height: 32px; font-size: 12px; }
        .avatar.lg { width: 48px; height: 48px; font-size: 16px; }
        .online-dot {
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 10px;
            height: 10px;
            background: var(--green);
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
        }

        /* Toast notification */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            min-width: 280px;
            max-width: 360px;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .toast.error { border-left-color: var(--red); }
        .toast.success { border-left-color: var(--green); }
        .toast.warning { border-left-color: var(--yellow); }
        .toast-icon { font-size: 18px; }
        .toast-body { flex: 1; }
        .toast-title { font-weight: 600; font-size: 13px; }
        .toast-msg { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(10px); }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            max-width: 460px;
            width: 90%;
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .modal p { color: var(--text-secondary); margin-bottom: 24px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div id="toast-container"></div>
    
    {% block content %}{% endblock %}

    <script>
        // Toast notification system
        function showToast(title, message, type = 'info', duration = 4000) {
            const icons = { info: '💬', success: '✅', error: '❌', warning: '⚠️' };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${icons[type] || icons.info}</span>
                <div class="toast-body">
                    <div class="toast-title">${title}</div>
                    ${message ? `<div class="toast-msg">${message}</div>` : ''}
                </div>
            `;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // CSRF helper
        function getCookie(name) {
            let v = null;
            document.cookie.split(';').forEach(c => {
                const [k, val] = c.trim().split('=');
                if (k === name) v = decodeURIComponent(val);
            });
            return v;
        }
        const CSRF = getCookie('csrftoken');
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
